<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hover Attack JS - Complete Edition</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #game-wrapper { position: relative; margin-top: 10px; border: 4px solid #444; }
        canvas { background: #000; image-rendering: pixelated; display: block; }
        .info { padding: 10px; text-align: center; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="game" width="640" height="480"></canvas>
    </div>
    <div class="info">
        [CLICK SCREEN TO START] - ARROW KEYS: MOVE & HOVER / SPACE: SHOOT / DOWN: DOCK
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- 音声生成 ---
function beep(freq, duration, type='square', vol=0.1) {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

// --- マップ構築 (縦長20タイル) ---
const MAP_W = 100; const MAP_H = 25; const TILE_SIZE = 32;
const stageMap = Array(MAP_H).fill(0).map(() => Array(MAP_W).fill(0));
for(let x=0; x<MAP_W; x++) {
    stageMap[MAP_H-1][x] = 1; // 地面
    if (x > 5) stageMap[0][x] = 1; // 天井
    if (x > 20 && x < 45) stageMap[5][x] = 1; // 高所の足場
    if (x > 15 && x < 30) stageMap[MAP_H-6][x] = 1; // 低所の島
    if (x > 50 && x < 80) stageMap[MAP_H-12][x] = 1; // 中層の巨大大陸
}

// --- オブジェクト ---
const player = {
    x: 100, y: (MAP_H - 2) * TILE_SIZE, vx: 0, vy: 0, 
    w: 24, h: 16, dir: 1, isHovering: false, inCarrier: false,
    fuel: 100, maxFuel: 100, missiles: 20, maxMissiles: 20
};
const carrier = { x: 40, y: (MAP_H - 2) * TILE_SIZE, w: 96, h: 16 };
let bullets = [];
let cameraX = 0; let cameraY = 0;
const keys = {};

window.onclick = () => audioCtx.resume();
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => {
    keys[e.code] = false;
    if (e.code === 'Space') player.canShoot = true;
};

function update() {
    // --- 補給・キャリア内処理 ---
    if (player.inCarrier) {
        let charging = false;
        if (player.fuel < player.maxFuel) { player.fuel += 0.5; charging = true; }
        if (player.missiles < player.maxMissiles) { player.missiles += 0.2; charging = true; }
        
        if (charging && Math.floor(Date.now() / 100) % 2 === 0) beep(1200, 0.02, 'sine', 0.03);

        if (keys['ArrowUp']) { 
            player.inCarrier = false; player.vy = -3; 
            beep(200, 0.3, 'sawtooth');
        }
        return;
    }

    // --- 通常移動 ---
    if (keys['ArrowUp'] && player.fuel > 0) {
        player.vy -= 0.22; player.fuel -= 0.1;// ← ここ！この 0.35 を 0.1 くらいにすると長持ちします
        player.isHovering = true;
        if (Math.random() < 0.1) beep(80 + Math.random()*40, 0.05, 'sawtooth', 0.05);
    } else { player.isHovering = false; }

    if (keys['ArrowLeft'] && player.fuel > 0) { player.vx -= 0.15; player.dir = -1; player.fuel -= 0.001; }// ← ここ！ 0.01 や 0.005 にすると歩行燃費が良くなります
    if (keys['ArrowRight'] && player.fuel > 0) { player.vx += 0.15; player.dir = 1; player.fuel -= 0.001; }

    // --- 射撃 ---
    if (keys['Space'] && player.canShoot && player.missiles >= 1) {
        bullets.push({ x: player.x + (player.dir > 0 ? player.w : 0), y: player.y + 6, vx: player.dir * 8 });
        player.missiles--; player.canShoot = false;
        beep(600, 0.08, 'square');
    }

    // --- 物理計算 ---
    player.vy += 0.12; player.vx *= 0.94; player.vy *= 0.98;
    player.x += player.vx; player.y += player.vy;

    // 地形衝突判定 (簡易版)
    const tx = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const ty = Math.floor((player.y + player.h) / TILE_SIZE);
    const hty = Math.floor(player.y / TILE_SIZE);

    if (stageMap[ty] && stageMap[ty][tx] === 1) { player.y = ty * TILE_SIZE - player.h; player.vy = 0; }
    if (stageMap[hty] && stageMap[hty][tx] === 1) { player.y = (hty + 1) * TILE_SIZE; player.vy = 0; }
    if (player.x < 0) player.x = 0;
    if (player.x > MAP_W * TILE_SIZE - player.w) player.x = MAP_W * TILE_SIZE - player.w;

    // --- 着艦判定 ---
    const distToCarrierX = Math.abs(player.x - (carrier.x + 30));
    const distToCarrierY = Math.abs(player.y - (carrier.y - 12));
    if (keys['ArrowDown'] && distToCarrierX < 30 && distToCarrierY < 20) {
        player.inCarrier = true; player.vx = 0; player.vy = 0;
        player.x = carrier.x + 36; player.y = carrier.y - 4;
        beep(300, 0.4, 'sine');
    }

    bullets.forEach(b => b.x += b.vx);
    bullets = bullets.filter(b => b.x > cameraX && b.x < cameraX + 640);

    // --- カメラ追従 ---
    cameraX = player.x - 320; cameraY = player.y - 300;
    cameraX = Math.max(0, Math.min(cameraX, MAP_W * TILE_SIZE - 640));
    cameraY = Math.max(0, Math.min(cameraY, MAP_H * TILE_SIZE - 480));
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. ゲーム世界描画
    ctx.save();
    ctx.translate(-cameraX, -cameraY);

    // 地形
    ctx.fillStyle = "#753";
    for(let i=0; i<MAP_H; i++) {
        for(let j=0; j<MAP_W; j++) {
            if(stageMap[i][j]) ctx.fillRect(j*TILE_SIZE, i*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    // 空母 (キャリア)
    ctx.fillStyle = "#446"; ctx.fillRect(carrier.x, carrier.y, carrier.w, carrier.h);
    ctx.fillStyle = "#779"; ctx.fillRect(carrier.x + 10, carrier.y + 10, carrier.w - 20, 4);

    // 着艦ガイド表示
    if (!player.inCarrier) {
        const nearX = Math.abs(player.x - (carrier.x + 30)) < 40;
        const nearY = Math.abs(player.y - (carrier.y - 12)) < 40;
        if (nearX && nearY && Math.floor(Date.now() / 250) % 2 === 0) {
            ctx.fillStyle = "#FFFF00"; ctx.font = "bold 12px monospace"; ctx.textAlign = "center";
            ctx.fillText("PRESS ↓ TO DOCK", player.x + player.w/2, player.y - 15);
        }
    }

    // プレイヤー
    if (!player.inCarrier) {
        ctx.fillStyle = player.isHovering ? "#0F0" : "#0A0";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "#FFF"; ctx.fillRect(player.x + (player.dir > 0 ? 14 : 2), player.y - 4, 8, 8); // Head
        if (player.isHovering) {
            ctx.fillStyle = "#F60"; ctx.fillRect(player.x + 4, player.y + player.h, 16, 5 + Math.random()*10);
        }
    } else {
        // 格納中ガイド
        ctx.fillStyle = "#050"; ctx.fillRect(player.x, player.y, player.w, player.h);
        if (Math.floor(Date.now() / 400) % 2 === 0) {
            ctx.fillStyle = "#0F0"; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
            ctx.fillText("PRESS ↑ TO LAUNCH", carrier.x + carrier.w/2, carrier.y - 20);
        }
    }

    // 弾
    ctx.fillStyle = "#FF0"; bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 2));

    ctx.restore();

    // 2. HUD (レーダー & ステータス)
    ctx.fillStyle = "rgba(0, 0, 40, 0.85)"; ctx.fillRect(0, 0, 640, 100);
    ctx.strokeStyle = "#444"; ctx.strokeRect(0, 0, 640, 100);

    // ミニマップ
    const mS = 4; const mX = 15; const mY = 15;
    ctx.fillStyle = "#000"; ctx.fillRect(mX, mY, MAP_W*mS, MAP_H*mS);
    ctx.strokeStyle = "#666"; ctx.strokeRect(mX, mY, MAP_W*mS, MAP_H*mS);
    
    ctx.fillStyle = "#333";
    for(let i=0; i<MAP_H; i++) for(let j=0; j<MAP_W; j++) 
        if(stageMap[i][j]) ctx.fillRect(mX+j*mS, mY+i*mS, mS, mS);

    ctx.fillStyle = "#00F"; ctx.fillRect(mX+(carrier.x/TILE_SIZE)*mS, mY+(carrier.y/TILE_SIZE)*mS, (carrier.w/TILE_SIZE)*mS, mS);
    
    if (Math.floor(Date.now() / 150) % 2 === 0) {
        ctx.fillStyle = "#0F0"; ctx.fillRect(mX+(player.x/TILE_SIZE)*mS, mY+(player.y/TILE_SIZE)*mS, mS, mS);
    }

    // ステータス
    ctx.fillStyle = "#FFF"; ctx.font = "14px monospace"; ctx.textAlign = "left";
    ctx.fillText("ENERGY", 440, 35);
    ctx.fillStyle = "#222"; ctx.fillRect(500, 25, 120, 12);
    ctx.fillStyle = player.fuel > 25 ? "#0F0" : "#F00";
    ctx.fillRect(500, 25, (player.fuel/player.maxFuel)*120, 12);

    ctx.fillStyle = "#FFF";
    ctx.fillText(`MISSILE: ${Math.floor(player.missiles)}`, 440, 65);
    if (player.inCarrier) {
        ctx.fillStyle = "#FF0"; ctx.fillText("STATUS: SUPPLYING...", 440, 85);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
