<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hover Attack JS - Enhanced UI</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #game-wrapper { position: relative; margin-top: 15px; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { background: #000; image-rendering: pixelated; display: block; }
        .info { padding: 15px; text-align: center; color: #aaa; font-size: 13px; line-height: 1.6; }
        b { color: #0f0; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="game" width="640" height="480"></canvas>
    </div>

    <div class="info">
        <b>[操作方法]</b><br>
        カーソルキー: 移動・ホバー上昇・着艦 / SPACE: ミサイル発射<br>
        空母(青い台座)の上で <b>↓キー</b> を押すと補給。空母内で <b>↑キー</b> で再発進。
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// --- 音声生成 ---
function beep(freq, duration, type='square', vol=0.1) {
    if (audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; 
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); 
    gain.connect(audioCtx.destination);
    osc.start(); 
    osc.stop(audioCtx.currentTime + duration);
}

// --- マップ構築 ---
const MAP_W = 100; 
const MAP_H = 25; 
const TILE_SIZE = 32;
const stageMap = Array(MAP_H).fill(0).map(() => Array(MAP_W).fill(0));

for(let x=0; x<MAP_W; x++) {
    stageMap[MAP_H-1][x] = 1; 
    if (x > 5) stageMap[0][x] = 1; 
    if (x > 20 && x < 45) stageMap[6][x] = 1; 
    if (x > 15 && x < 30) stageMap[MAP_H-6][x] = 1; 
    if (x > 55 && x < 85) stageMap[MAP_H-12][x] = 1; 
}

const carrier = { x: 40, y: (MAP_H - 2) * TILE_SIZE, w: 96, h: 16 };

// --- ゲーム状態変数 (初期位置を設定) ---
let gameState = "START"; 
const player = {
    x: carrier.x + 36, // 最初から空母の位置に配置
    y: carrier.y - 4,
    vx: 0, vy: 0, 
    w: 24, h: 16, dir: 1, 
    isHovering: false, inCarrier: true, canShoot: true,
    fuel: 100, maxFuel: 100, missiles: 20, maxMissiles: 20
};

let bullets = [];
let cameraX = player.x - 320; // カメラも最初からプレイヤーに合わせる
let cameraY = player.y - 300;
const keys = {};

function resetGame() {
    player.x = carrier.x + 36;
    player.y = carrier.y - 4;
    player.vx = 0; player.vy = 0;
    player.fuel = player.maxFuel;
    player.missiles = player.maxMissiles;
    player.inCarrier = true;
    bullets = [];
    gameState = "PLAYING";
    beep(400, 0.5, 'sine');
}

window.addEventListener('mousedown', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (gameState === "START") gameState = "PLAYING";
});

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' && gameState === "GAMEOVER") resetGame();
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'Space') player.canShoot = true;
});

function update() {
    if (gameState !== "PLAYING") return;

    if (player.inCarrier) {
        let charging = false;
        if (player.fuel < player.maxFuel) { player.fuel += 0.4; charging = true; }
        if (player.missiles < player.maxMissiles) { player.missiles += 0.2; charging = true; }
        if (charging && Math.floor(Date.now() / 100) % 2 === 0) beep(1200, 0.02, 'sine', 0.03);

        if (keys['ArrowUp']) { 
            player.inCarrier = false; player.vy = -3; 
            beep(200, 0.3, 'sawtooth');
        }
        return;
    }

    if (keys['ArrowUp'] && player.fuel > 0) {
        player.vy -= 0.22; 
        player.fuel -= 0.15; 
        player.isHovering = true;
        if (Math.random() < 0.1) beep(80 + Math.random()*40, 0.05, 'sawtooth', 0.05);
    } else { player.isHovering = false; }

    if (keys['ArrowLeft'] && player.fuel > 0) { player.vx -= 0.15; player.dir = -1; player.fuel -= 0.005; }
    if (keys['ArrowRight'] && player.fuel > 0) { player.vx += 0.15; player.dir = 1; player.fuel -= 0.005; }

    if (keys['Space'] && player.canShoot && player.missiles >= 1) {
        bullets.push({ x: player.x + (player.dir > 0 ? player.w : 0), y: player.y + 6, vx: player.dir * 8 });
        player.missiles--; player.canShoot = false;
        beep(600, 0.08, 'square');
    }

    player.vy += 0.12; 
    player.vx *= 0.94; 
    player.vy *= 0.98;
    player.x += player.vx; 
    player.y += player.vy;

    const tx = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const ty = Math.floor((player.y + player.h) / TILE_SIZE);
    const hty = Math.floor(player.y / TILE_SIZE);

    if (stageMap[ty] && stageMap[ty][tx] === 1) { player.y = ty * TILE_SIZE - player.h; player.vy = 0; }
    if (stageMap[hty] && stageMap[hty][tx] === 1) { player.y = (hty + 1) * TILE_SIZE; player.vy = 0; }

    if (player.x < 0) player.x = 0;
    if (player.x > MAP_W * TILE_SIZE - player.w) player.x = MAP_W * TILE_SIZE - player.w;

    if (player.fuel <= 0 && Math.abs(player.vy) < 0.1) {
        gameState = "GAMEOVER";
        beep(100, 0.8, 'sawtooth');
    }

    const distX = Math.abs(player.x - (carrier.x + 30));
    const distY = Math.abs(player.y - (carrier.y - 12));
    if (keys['ArrowDown'] && distX < 40 && distY < 25) {
        player.inCarrier = true; player.vx = 0; player.vy = 0;
        player.x = carrier.x + 36; player.y = carrier.y - 4;
        beep(300, 0.4, 'sine');
    }

    bullets.forEach(b => b.x += b.vx);
    bullets = bullets.filter(b => b.x > cameraX - 100 && b.x < cameraX + 740);

    cameraX = player.x - 320; 
    cameraY = player.y - 300;
    cameraX = Math.max(0, Math.min(cameraX, MAP_W * TILE_SIZE - 640));
    cameraY = Math.max(0, Math.min(cameraY, MAP_H * TILE_SIZE - 480));
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 常に世界を描画する (START画面でも背景として見せる)
    ctx.save();
    ctx.translate(-cameraX, -cameraY);

    // マップ
    ctx.fillStyle = "#753";
    for(let i=0; i<MAP_H; i++) {
        for(let j=0; j<MAP_W; j++) {
            if(stageMap[i][j]) ctx.fillRect(j*TILE_SIZE, i*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    // 空母
    ctx.fillStyle = "#446"; ctx.fillRect(carrier.x, carrier.y, carrier.w, carrier.h);
    ctx.fillStyle = "#779"; ctx.fillRect(carrier.x + 10, carrier.y + 10, carrier.w - 20, 4);

    // プレイヤー (START画面でも表示)
    if (player.inCarrier) {
        ctx.fillStyle = "#050"; 
    } else {
        ctx.fillStyle = player.isHovering ? "#0F0" : "#0A0";
    }
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "#FFF"; ctx.fillRect(player.x + (player.dir > 0 ? 14 : 2), player.y - 4, 8, 8);

    // ガイド点滅
    const blink = Math.floor(Date.now() / 250) % 2 === 0;
    if (gameState === "PLAYING" && player.inCarrier && blink) {
        ctx.fillStyle = "#0F0"; ctx.font = "bold 14px monospace"; ctx.textAlign = "center";
        ctx.fillText("PRESS ↑ TO LAUNCH", carrier.x + carrier.w/2, carrier.y - 20);
    }

    ctx.restore();

    // HUD (常に最前面)
    ctx.fillStyle = "rgba(0, 0, 40, 0.9)"; ctx.fillRect(0, 0, 640, 100);
    const mS = 4; const mX = 15; const mY = 15;
    ctx.fillStyle = "#000"; ctx.fillRect(mX, mY, MAP_W*mS, MAP_H*mS);
    ctx.fillStyle = "#333";
    for(let i=0; i<MAP_H; i++) for(let j=0; j<MAP_W; j++) 
        if(stageMap[i][j]) ctx.fillRect(mX+j*mS, mY+i*mS, mS, mS);
    ctx.fillStyle = "#00F"; ctx.fillRect(mX+(carrier.x/TILE_SIZE)*mS, mY+(carrier.y/TILE_SIZE)*mS, (carrier.w/TILE_SIZE)*mS, mS);
    if (blink) { ctx.fillStyle = "#0F0"; ctx.fillRect(mX+(player.x/TILE_SIZE)*mS, mY+(player.y/TILE_SIZE)*mS, mS, mS); }

    // エネルギー
    ctx.fillStyle = "#FFF"; ctx.font = "14px monospace"; ctx.textAlign = "left";
    ctx.fillText("ENERGY", 440, 35);
    ctx.fillStyle = "#222"; ctx.fillRect(500, 25, 120, 12);
    ctx.fillStyle = player.fuel > 25 ? "#0F0" : "#F00";
    ctx.fillRect(500, 25, (Math.max(0, player.fuel)/player.maxFuel)*120, 12);
    ctx.fillText(`MISSILE: ${Math.floor(player.missiles)}`, 440, 65);

    // 特殊オーバーレイ
    if (gameState === "START") {
        ctx.fillStyle = "rgba(0,0,0,0.6)"; // 透明度を下げて背後を見せる
        ctx.fillRect(0,0,640,480);
        ctx.fillStyle = "#0F0"; ctx.font = "bold 30px monospace"; ctx.textAlign = "center";
        ctx.fillText("HOVER ATTACK JS", 320, 220);
        ctx.fillStyle = "#FFF"; ctx.font = "16px monospace";
        if (blink) ctx.fillText("CLICK TO START", 320, 280);
    }

    if (gameState === "GAMEOVER") {
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,640,480);
        ctx.fillStyle = "#F00"; ctx.font = "bold 40px monospace"; ctx.textAlign = "center";
        ctx.fillText("GAME OVER", 320, 220);
        if (blink) ctx.fillText("PRESS SPACE TO RESTART", 320, 280);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
